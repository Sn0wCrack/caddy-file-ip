name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

  container-test:
    name: Container Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Containerfile
        uses: docker/build-push-action@v5
        with:
          file: ./Containerfile
          load: true
          tags: caddy-file-ip:test

      - name: Run container
        run: |
          docker run -d \
            --name caddy-test \
            -p 8080:8080 \
            -v ${{ github.workspace }}/test/ip-list.txt:/app/ip-list.txt:ro \
            -v ${{ github.workspace }}/test/Caddyfile:/app/Caddyfile:ro \
            caddy-file-ip:test \
            caddy run --config /app/Caddyfile --adapter caddyfile

      - name: Wait for Caddy to start
        run: sleep 5

      - name: Check Caddy is running
        run: docker logs caddy-test

      - name: Test endpoint
        run: |
          sleep 2
          curl -s --fail http://localhost:8080/ | grep -q "Hello"

      - name: Stop and remove container
        if: always()
        run: |
          docker stop caddy-test || true
          docker rm caddy-test || true